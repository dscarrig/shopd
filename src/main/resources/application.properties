spring.application.name=shopd
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database=postgresql
spring.datasource.url=jdbc:postgresql://localhost:5432/local
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
server.port=8081
server.compression.enabled=true
spring.data.rest.base-path=/api/rest

# JWT Configuration
jwt.signing.key.secret=ThisIsAVerySecureSecretKeyForJWTTokenSigningThatMeetsTheMinimumLengthRequirement123456789
jwt.get.token.uri=/authenticate
jwt.refresh.token.uri=/refresh
jwt.http.request.header=Authorization
jwt.token.expiration.in.seconds=604800

# Credit Card Encryption
# IMPORTANT: NOT FOR PRODUCTION USE
# Keep this secret safe and never commit it to version control
encryption.secret.key=MySecureEncryptionKey2026ForCreditCards!

# File Storage Configuration
file.storage.upload-dir=uploads/images

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Google Cloud Storage Configuration
# Using Application Default Credentials (no key file needed)
spring.cloud.gcp.project-id=${GCP_PROJECT_ID:project-cc341b7e-905e-4a69-815}
gcs.bucket.name=${GCS_BUCKET_NAME:shopd-uploads}

# AWS S3 Configuration
aws.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket-name=${AWS_S3_BUCKET:shopd-uploads}

# Debug logging for GCS
logging.level.com.google.cloud=DEBUG
logging.level.org.springframework.cloud.gcp=DEBUG
logging.level.com.backend.shopd.service.GoogleCloudStorageService=DEBUG
